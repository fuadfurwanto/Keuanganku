<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FinansialKu - Brankas Pribadi</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & Babel -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .toast-enter { animation: slideDown 0.3s ease-out forwards; }
    @keyframes slideDown {
      from { transform: translate(-50%, -100%); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-24">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    
    // Kita hanya butuh Firestore (Database), tidak butuh Auth yang suka error di HP
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // ==========================================
    // 🔴 PASTE FIREBASE CONFIG ANDA DI SINI 🔴
    // ==========================================
    const firebaseConfig = {
  const firebaseConfig = {
  apiKey: "AIzaSyBV86XDz9mtCZkHF5o-PA9lzK4BFfJAIR4",
  authDomain: "finansialku-pribadi-d843c.firebaseapp.com",
  projectId: "finansialku-pribadi-d843c",
  storageBucket: "finansialku-pribadi-d843c.firebasestorage.app",
  messagingSenderId: "960584015160",
  appId: "1:960584015160:web:e5b5039d31e2e4075635cd"
};
    // Cek apakah config sudah diubah
    const isConfigValid = firebaseConfig.apiKey !== "AIzaSyBV86XDz9mtCZkHF5o-PA9lzK4BFfJAIR4";
    
    let app, db;
    if (isConfigValid) {
      app = initializeApp(firebaseConfig);
      db = getFirestore(app);
    }

    // Formatters
    const formatIDR = (amount) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount);
    const formatDate = (dateString) => new Date(dateString).toLocaleDateString('id-ID', { year: 'numeric', month: 'short', day: 'numeric' });

    function App() {
      // --- SISTEM KUNCI BRANKAS ---
      // Mengecek apakah HP ini sudah punya kunci sebelumnya
      const [appKey, setAppKey] = useState(localStorage.getItem('fin_kunci_rahasia') || '');
      const [inputKey, setInputKey] = useState('');

      const [toast, setToast] = useState('');
      const [activeTab, setActiveTab] = useState('ringkasan');
      const [transactions, setTransactions] = useState([]);
      const [debts, setDebts] = useState([]);

      const [txType, setTxType] = useState('pengeluaran');
      const [txAmount, setTxAmount] = useState('');
      const [txDesc, setTxDesc] = useState('');
      const [txDate, setTxDate] = useState(new Date().toISOString().split('T')[0]);

      const [debtAmount, setDebtAmount] = useState('');
      const [debtDesc, setDebtDesc] = useState('');
      const [debtDueDate, setDebtDueDate] = useState('');

      const [reportMonth, setReportMonth] = useState(new Date().getMonth());
      const [reportYear, setReportYear] = useState(new Date().getFullYear());

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(''), 3000);
      };

      // Fungsi Buka Brankas (Login Manual)
      const handleLogin = (e) => {
        e.preventDefault();
        if (!inputKey.trim()) return;
        const key = inputKey.trim().toLowerCase();
        localStorage.setItem('fin_kunci_rahasia', key); // Simpan di HP
        setAppKey(key); // Masuk ke aplikasi
      };

      // Fungsi Ganti HP / Keluar
      const handleLogout = () => {
        if(confirm('Yakin ingin mengunci aplikasi? Anda butuh kunci rahasia Anda untuk membukanya kembali.')) {
          localStorage.removeItem('fin_kunci_rahasia');
          setAppKey('');
          setTransactions([]);
          setDebts([]);
        }
      };

      // MENGAMBIL DATA DARI CLOUD BERDASARKAN KUNCI
      useEffect(() => {
        if (!appKey || !db) return;

        // Path penyimpanan bergantung pada KUNCI yang dimasukkan
        const txRef = collection(db, 'data_keuangan', appKey, 'transaksi');
        const unsubTx = onSnapshot(txRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => new Date(b.date) - new Date(a.date)); 
          setTransactions(data);
        }, (error) => console.error("Error mengambil transaksi:", error));

        const debtRef = collection(db, 'data_keuangan', appKey, 'hutang');
        const unsubDebt = onSnapshot(debtRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
          setDebts(data);
        }, (error) => console.error("Error mengambil hutang:", error));

        return () => { unsubTx(); unsubDebt(); };
      }, [appKey]);

      // KALKULASI KEUANGAN
      const { totalIncome, totalExpense, balance } = useMemo(() => {
        let income = 0; let expense = 0;
        transactions.forEach(tx => {
          if (tx.type === 'pemasukan') income += tx.amount;
          else expense += tx.amount;
        });
        return { totalIncome: income, totalExpense: expense, balance: income - expense };
      }, [transactions]);

      const totalDebt = useMemo(() => {
        return debts.filter(d => !d.isPaid).reduce((sum, d) => sum + d.amount, 0);
      }, [debts]);

      // FUNGSI SIMPAN & HAPUS KE FIREBASE
      const handleAddTx = async (e) => {
        e.preventDefault();
        if (!txAmount || !txDesc || !appKey || !db) return;
        // Simpan langsung ke folder KUNCI Anda
        const newDocRef = doc(collection(db, 'data_keuangan', appKey, 'transaksi'));
        await setDoc(newDocRef, { type: txType, amount: parseFloat(txAmount), description: txDesc, date: txDate });
        setTxAmount(''); setTxDesc('');
        showToast('✔️ Transaksi tersimpan');
      };

      const handleDeleteTx = async (id) => {
        if (!appKey || !db) return;
        await deleteDoc(doc(db, 'data_keuangan', appKey, 'transaksi', id));
        showToast('🗑️ Transaksi dihapus');
      };

      const handleAddDebt = async (e) => {
        e.preventDefault();
        if (!debtAmount || !debtDesc || !debtDueDate || !appKey || !db) return;
        const newDocRef = doc(collection(db, 'data_keuangan', appKey, 'hutang'));
        await setDoc(newDocRef, { amount: parseFloat(debtAmount), description: debtDesc, dueDate: debtDueDate, isPaid: false });
        setDebtAmount(''); setDebtDesc(''); setDebtDueDate('');
        showToast('✔️ Hutang tercatat');
      };

      const handleToggleDebt = async (debtObj) => {
        if (!appKey || !db) return;
        await setDoc(doc(db, 'data_keuangan', appKey, 'hutang', debtObj.id), { ...debtObj, isPaid: !debtObj.isPaid });
      };

      const handleDeleteDebt = async (id) => {
        if (!appKey || !db) return;
        await deleteDoc(doc(db, 'data_keuangan', appKey, 'hutang', id));
        showToast('🗑️ Hutang dihapus');
      };

      // FUNGSI UNDUH CSV KE HP
      const handleDownloadCSV = () => {
        const filteredTx = transactions.filter(tx => {
          const d = new Date(tx.date);
          return d.getMonth() === parseInt(reportMonth) && d.getFullYear() === parseInt(reportYear);
        });

        if (filteredTx.length === 0) {
          showToast('⚠️ Tidak ada data untuk diunduh bulan ini');
          return;
        }

        const rows = [['Tanggal', 'Tipe', 'Deskripsi', 'Nominal']];
        filteredTx.forEach(tx => rows.push([tx.date, tx.type, `"${tx.description}"`, tx.amount]));
        
        const mIncome = filteredTx.filter(t => t.type === 'pemasukan').reduce((s, t) => s + t.amount, 0);
        const mExpense = filteredTx.filter(t => t.type === 'pengeluaran').reduce((s, t) => s + t.amount, 0);
        
        rows.push(['', '', '', '']);
        rows.push(['', '', 'Total Pemasukan', mIncome]);
        rows.push(['', '', 'Total Pengeluaran', mExpense]);
        rows.push(['', '', 'Sisa/Selisih', mIncome - mExpense]);

        const csvContent = rows.map(e => e.join(",")).join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        
        const link = document.createElement("a");
        link.href = url;
        link.setAttribute("download", `Laporan_Keuangan_${reportYear}_${parseInt(reportMonth)+1}.csv`);
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        showToast('📥 Laporan berhasil diunduh');
      };

      // TAMPILAN JIKA BELUM SETUP CONFIG
      if (!isConfigValid) {
        return (
          <div className="flex h-screen items-center justify-center bg-gray-50 p-6 text-center">
            <div className="bg-white p-6 rounded-2xl shadow border border-orange-200 max-w-sm">
              <span className="text-4xl block mb-4">🔧</span>
              <h2 className="text-xl font-bold text-orange-600 mb-2">Setup Firebase Belum Selesai</h2>
              <p className="text-gray-600">Pastikan Anda sudah menempelkan kode Config Firebase Anda di dalam file ini.</p>
            </div>
          </div>
        );
      }

      // TAMPILAN HALAMAN LOGIN (KUNCI BRANKAS)
      if (!appKey) {
        return (
          <div className="flex h-screen items-center justify-center bg-gray-50 p-6">
            <div className="bg-white p-8 rounded-3xl shadow-lg border border-gray-100 max-w-sm w-full text-center">
              <span className="text-6xl block mb-6">🔐</span>
              <h2 className="text-2xl font-bold text-gray-800 mb-2">Buka Brankas</h2>
              <p className="text-gray-500 text-sm mb-6">Buat kata sandi baru atau masukkan kata sandi Anda yang sudah ada untuk mengakses data Anda.</p>
              
              <form onSubmit={handleLogin}>
                <input 
                  type="text" 
                  required 
                  placeholder="Contoh: rizky123" 
                  value={inputKey} 
                  onChange={e => setInputKey(e.target.value)} 
                  className="w-full p-4 border rounded-xl text-center font-bold text-lg mb-4 focus:ring-4 focus:ring-blue-100 outline-none transition-all" 
                />
                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-colors shadow-lg shadow-blue-200">
                  Buka / Buat Aplikasi
                </button>
              </form>
            </div>
          </div>
        );
      }

      // TAMPILAN UTAMA APLIKASI
      return (
        <div>
          {/* Toast Notification */}
          {toast && (
            <div className="fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-2 rounded-full shadow-lg z-50 text-sm font-medium flex items-center space-x-2 toast-enter">
              <span>{toast}</span>
            </div>
          )}

          {/* Header */}
          <header className="bg-blue-700 text-white p-4 shadow-md sticky top-0 z-20 flex justify-between items-center">
            <div className="flex items-center space-x-2">
              <span className="text-2xl">👛</span>
              <div>
                <h1 className="text-lg font-bold leading-tight">FinansialKu</h1>
                <p className="text-[10px] text-blue-200">User: {appKey}</p>
              </div>
            </div>
            <button onClick={handleLogout} className="text-xs bg-blue-800 hover:bg-red-600 transition-colors px-3 py-2 rounded-lg flex items-center shadow-inner font-bold">
              🔒 Kunci
            </button>
          </header>

          {/* Navigasi Bawah */}
          <nav className="fixed bottom-0 w-full bg-white border-t flex justify-around p-3 pb-safe z-20 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
            {[
              { id: 'ringkasan', icon: '📊', label: 'Ringkasan' },
              { id: 'transaksi', icon: '💸', label: 'Transaksi' },
              { id: 'hutang', icon: '💳', label: 'Hutang' },
              { id: 'laporan', icon: '📄', label: 'Laporan' },
            ].map(tab => (
              <button 
                key={tab.id} onClick={() => setActiveTab(tab.id)}
                className={`flex flex-col items-center justify-center w-full transition-colors ${activeTab === tab.id ? 'text-blue-600' : 'text-gray-400'}`}
              >
                <span className="text-xl mb-1 filter drop-shadow-sm">{tab.icon}</span>
                <span className="text-[10px] font-medium">{tab.label}</span>
              </button>
            ))}
          </nav>

          <main className="p-4">
            {/* TAB: RINGKASAN */}
            {activeTab === 'ringkasan' && (
              <div className="space-y-4">
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden">
                  <div className="absolute top-0 right-0 p-4 opacity-10 text-6xl">💰</div>
                  <p className="text-gray-500 text-sm mb-1 relative z-10">Total Uang Dipegang</p>
                  <p className={`text-3xl font-bold relative z-10 ${balance >= 0 ? 'text-gray-800' : 'text-red-600'}`}>{formatIDR(balance)}</p>
                </div>
                
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                  <p className="text-gray-500 text-sm mb-1">⚠️ Total Hutang Aktif</p>
                  <p className="text-3xl font-bold text-orange-600">{formatIDR(totalDebt)}</p>
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <div className="bg-green-50 p-4 rounded-xl border border-green-100">
                    <p className="text-green-700 text-xs font-bold mb-1">📈 Pemasukan</p>
                    <p className="text-lg font-bold text-green-800">{formatIDR(totalIncome)}</p>
                  </div>
                  <div className="bg-red-50 p-4 rounded-xl border border-red-100">
                    <p className="text-red-700 text-xs font-bold mb-1">📉 Pengeluaran</p>
                    <p className="text-lg font-bold text-red-800">{formatIDR(totalExpense)}</p>
                  </div>
                </div>
              </div>
            )}

            {/* TAB: TRANSAKSI */}
            {activeTab === 'transaksi' && (
              <div className="space-y-6">
                <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                  <h2 className="font-bold mb-3 flex items-center">➕ Tambah Transaksi</h2>
                  <form onSubmit={handleAddTx} className="space-y-3">
                    <div className="flex space-x-2">
                      <button type="button" onClick={() => setTxType('pengeluaran')} className={`flex-1 py-2 rounded-lg text-sm font-bold border transition-colors ${txType === 'pengeluaran' ? 'bg-red-50 text-red-600 border-red-200 shadow-inner' : 'bg-gray-50 text-gray-400 border-gray-200'}`}>Pengeluaran</button>
                      <button type="button" onClick={() => setTxType('pemasukan')} className={`flex-1 py-2 rounded-lg text-sm font-bold border transition-colors ${txType === 'pemasukan' ? 'bg-green-50 text-green-600 border-green-200 shadow-inner' : 'bg-gray-50 text-gray-400 border-gray-200'}`}>Pemasukan</button>
                    </div>
                    <input type="number" required placeholder="Nominal (Rp)" value={txAmount} onChange={e=>setTxAmount(e.target.value)} className="w-full p-3 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
                    <input type="text" required placeholder="Keterangan (Makan, Gaji...)" value={txDesc} onChange={e=>setTxDesc(e.target.value)} className="w-full p-3 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
                    <input type="date" required value={txDate} onChange={e=>setTxDate(e.target.value)} className="w-full p-3 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors">Simpan Transaksi</button>
                  </form>
                </div>

                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                  <h2 className="font-bold p-4 border-b bg-gray-50 text-sm">Riwayat Transaksi</h2>
                  <div className="divide-y">
                    {transactions.length === 0 && <p className="p-6 text-center text-gray-400 text-sm">Belum ada transaksi</p>}
                    {transactions.map(tx => (
                      <div key={tx.id} className="p-4 flex justify-between items-center bg-white hover:bg-gray-50">
                        <div className="flex items-center space-x-3 overflow-hidden">
                          <span className="text-2xl">{tx.type === 'pemasukan' ? '📈' : '📉'}</span>
                          <div className="truncate">
                            <p className="font-semibold text-sm truncate">{tx.description}</p>
                            <p className="text-xs text-gray-400">{formatDate(tx.date)}</p>
                          </div>
                        </div>
                        <div className="flex items-center space-x-2 pl-2">
                          <span className={`font-bold text-sm whitespace-nowrap ${tx.type === 'pemasukan' ? 'text-green-600' : 'text-red-600'}`}>
                            {tx.type === 'pemasukan' ? '+' : '-'}{formatIDR(tx.amount)}
                          </span>
                          <button onClick={() => handleDeleteTx(tx.id)} className="text-xl p-1 bg-gray-50 hover:bg-red-50 rounded-lg">🗑️</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* TAB: HUTANG */}
            {activeTab === 'hutang' && (
              <div className="space-y-6">
                <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                  <h2 className="font-bold mb-3 flex items-center">➕ Catat Hutang</h2>
                  <form onSubmit={handleAddDebt} className="space-y-3">
                    <input type="number" required placeholder="Nominal Hutang (Rp)" value={debtAmount} onChange={e=>setDebtAmount(e.target.value)} className="w-full p-3 border rounded-xl text-sm focus:ring-2 focus:ring-orange-500 outline-none" />
                    <input type="text" required placeholder="Ke siapa / Keterangan" value={debtDesc} onChange={e=>setDebtDesc(e.target.value)} className="w-full p-3 border rounded-xl text-sm focus:ring-2 focus:ring-orange-500 outline-none" />
                    <label className="block text-xs text-gray-500">Jatuh Tempo:</label>
                    <input type="date" required value={debtDueDate} onChange={e=>setDebtDueDate(e.target.value)} className="w-full p-3 border rounded-xl text-sm focus:ring-2 focus:ring-orange-500 outline-none" />
                    <button type="submit" className="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-xl transition-colors">Simpan Hutang</button>
                  </form>
                </div>

                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                  <h2 className="font-bold p-4 border-b bg-gray-50 text-sm">Daftar Hutang</h2>
                  <div className="divide-y">
                    {debts.length === 0 && <p className="p-6 text-center text-gray-400 text-sm">Tidak ada hutang</p>}
                    {debts.map(debt => (
                      <div key={debt.id} className={`p-4 flex justify-between items-center ${debt.isPaid ? 'opacity-60 bg-gray-50' : 'bg-white'}`}>
                        <div className="flex items-center space-x-3 overflow-hidden">
                          <button onClick={() => handleToggleDebt(debt)} className="text-2xl min-w-[32px] transition-transform active:scale-90">
                            {debt.isPaid ? '✅' : '⭕'}
                          </button>
                          <div className="truncate">
                            <p className={`font-semibold text-sm truncate ${debt.isPaid ? 'line-through text-gray-500' : ''}`}>{debt.description}</p>
                            <p className={`text-xs ${!debt.isPaid && new Date(debt.dueDate) < new Date() ? 'text-red-500 font-bold' : 'text-gray-400'}`}>
                              Tempo: {formatDate(debt.dueDate)}
                            </p>
                          </div>
                        </div>
                        <div className="flex items-center space-x-2 pl-2">
                          <span className={`font-bold text-sm whitespace-nowrap ${debt.isPaid ? 'text-gray-500' : 'text-orange-600'}`}>
                            {formatIDR(debt.amount)}
                          </span>
                          <button onClick={() => handleDeleteDebt(debt.id)} className="text-xl p-1 bg-gray-50 hover:bg-red-50 rounded-lg">🗑️</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* TAB: LAPORAN */}
            {activeTab === 'laporan' && (
              <div className="space-y-4">
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center">
                  <span className="text-5xl block mb-3">📥</span>
                  <h2 className="text-xl font-bold mb-2">Unduh Laporan</h2>
                  <p className="text-sm text-gray-500 mb-5">Laporan bulanan akan diunduh secara langsung ke penyimpanan HP Anda.</p>
                  
                  <div className="flex space-x-2 mb-4">
                    <select value={reportMonth} onChange={e=>setReportMonth(e.target.value)} className="w-1/2 p-3 border rounded-xl text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500">
                      {['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'].map((m,i) => <option key={i} value={i}>{m}</option>)}
                    </select>
                    <select value={reportYear} onChange={e=>setReportYear(e.target.value)} className="w-1/2 p-3 border rounded-xl text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500">
                      {[2024, 2025, 2026, 2027].map(y => <option key={y} value={y}>{y}</option>)}
                    </select>
                  </div>

                  <button onClick={handleDownloadCSV} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors">
                    Unduh CSV
                  </button>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
